{% extends 'base.html' %}
{% block title %}Nuevo Servicio{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Nuevo Servicio</h1>
<form method="post" class="card space-y-4">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Cliente</label>
      <select name="client_id" class="input" required>
        <option value="">Seleccione cliente</option>
        {% for c in clients %}
        <option value="{{ c.id }}">{{ c.name }}{% if c.identifier %} - {{ c.identifier }}{% endif %}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Vendedor</label>
      <select name="seller" class="input">
        <option value="">Seleccione</option>
        {% for s in sellers %}
        <option value="{{ s.first_name }} {{ s.last_name }}">{{ s.first_name }} {{ s.last_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Método de pago</label>
      <select name="payment_method" class="input" id="payment_method">
        <option>Efectivo</option>
        <option>Transferencia</option>
        <option>Tarjeta</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Banco</label>
      <input name="bank" class="input" id="bank_field" placeholder="Banco (si aplica)">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Vigencia</label>
      <select name="validity_period" class="input">
        {% for value,days in validity_options.items() %}
        <option value="{{ value }}">{{ days }} días</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nota</label>
      <input name="note" class="input" placeholder="Nota opcional">
    </div>
  </div>

  <div class="card overflow-x-auto">
    <table class="min-w-full text-sm" id="service-table">
      <thead class="bg-gray-100">
        <tr>
          <th class="p-2 text-left">Artículo</th>
          <th class="p-2 text-left">Descripción</th>
          <th class="p-2 text-left">Cantidad</th>
          <th class="p-2 text-left">Tarifa</th>
          <th class="p-2 text-left">Monto</th>
          <th class="p-2"></th>
        </tr>
      </thead>
      <tbody id="service-body"></tbody>
    </table>
  </div>
  <div class="action-bar">
    <button type="button" class="action-btn is-info" id="add-service-row">Agregar servicio</button>
    <span class="text-sm font-semibold">Total: <span id="service-total">RD$0.00</span></span>
  </div>
  <button class="btn-primary">Guardar Servicio</button>
</form>
{% endblock %}

{% block scripts %}
<script>
(function(){
  const body = document.getElementById('service-body');
  const addBtn = document.getElementById('add-service-row');
  const totalEl = document.getElementById('service-total');

  function money(v){ return new Intl.NumberFormat('es-DO',{style:'currency',currency:'DOP'}).format(v || 0); }

  function recalc(){
    let total = 0;
    body.querySelectorAll('tr').forEach((row)=>{
      const qty = parseFloat(row.querySelector('[name="service_quantity[]"]').value || '0');
      const rate = parseFloat(row.querySelector('[name="service_rate[]"]').value || '0');
      const amount = Math.max(qty,0) * Math.max(rate,0);
      row.querySelector('.row-amount').textContent = money(amount);
      total += amount;
    });
    totalEl.textContent = money(total);
  }

  function addRow(){
    const tr = document.createElement('tr');
    tr.className = 'border-t';
    tr.innerHTML = `
      <td class="p-2"><input class="input" name="service_name[]" placeholder="Nombre del servicio" required></td>
      <td class="p-2"><input class="input" name="service_description[]" placeholder="Descripción"></td>
      <td class="p-2"><input class="input" type="number" min="1" step="1" name="service_quantity[]" value="1" required></td>
      <td class="p-2"><input class="input" type="number" min="0" step="0.01" name="service_rate[]" value="0" required></td>
      <td class="p-2 row-amount">RD$0.00</td>
      <td class="p-2"><button type="button" class="action-btn" style="background-color:#dc2626">Quitar</button></td>
    `;
    tr.querySelectorAll('input').forEach((i)=>i.addEventListener('input', recalc));
    tr.querySelector('button').addEventListener('click', ()=>{ tr.remove(); recalc(); });
    body.appendChild(tr);
    recalc();
  }

  addBtn.addEventListener('click', addRow);
  addRow();
})();
</script>
{% endblock %}
